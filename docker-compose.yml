# ==========================================
# Restaurant POS — Docker Compose
# ==========================================
# For local development only.
# Production deployments require proper secrets management,
# HTTPS termination and a controlled database migration strategy.
#
# Usage: docker-compose up -d
# This will start PostgreSQL. Then start the backend and frontend separately.
# ==========================================

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-pos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: restaurant_pos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant-pos-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/restaurant_pos
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frontend (optional in local dev — usually run with Vite dev server)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: restaurant-pos-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
