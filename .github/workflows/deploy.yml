# ==========================================
# Restaurant POS — CD Pipeline
# ==========================================
# Deploys to production on push to main.
# Only runs AFTER CI passes on the same commit.
# Builds Docker images and pushes to a registry,
# then triggers deployment on the target server.
# NEVER embeds or exposes deployment secrets.
# Secrets are injected via GitHub Secrets.
# ==========================================

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # 1. VERIFY CI PASSED
  # ─────────────────────────────────────────
  verify-ci:
    name: Verify CI
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed
        run: echo "✅ CI workflow completed successfully. Proceeding with deployment."

  # ─────────────────────────────────────────
  # 2. BUILD AND PUSH DOCKER IMAGES
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [verify-ci]
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digests
        run: |
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend | ${{ steps.meta-backend.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend | ${{ steps.meta-frontend.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 3. DEPLOY TO PRODUCTION
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: |
      success() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production
    concurrency: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH || '/opt/restaurant-pos' }}

            echo "Pull latest docker-compose and scripts..."
            git pull

            echo "Pull updated images..."
            docker compose --env-file .env.production -f docker-compose.prod.yml pull

            echo "Apply database migrations..."
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm backend npm run db:migrate:prod

            echo "Restart services..."
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans

            echo "Verify deployment..."
            sleep 10
            curl -sf http://localhost/api/health/live && echo " - live OK"
            curl -sf http://localhost/api/health/ready && echo " - ready OK"

            echo "Clean up old images..."
            docker image prune -f

      - name: Health check
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment triggered successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 4. ROLLBACK TRIGGER (manual)
  # ─────────────────────────────────────────
  rollback:
    name: Prepare Rollback Info
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: failure()
    steps:
      - name: Deployment failed
        run: |
          echo "## ⚠️ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment did not complete. The previous version should still be running." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To rollback manually:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "git revert HEAD" >> $GITHUB_STEP_SUMMARY
          echo "docker compose --env-file .env.production -f docker-compose.prod.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose --env-file .env.production -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
