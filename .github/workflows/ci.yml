# ==========================================
# Restaurant POS - CI Pipeline
# ==========================================
# Runs on every push and pull request.
# Installs dependencies, validates config,
# runs Prisma checks, TypeScript, lint,
# tests (when available), and production builds.
# NEVER exposes secrets to logs or artifacts.
# ==========================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------
  # 1. ENVIRONMENT VALIDATION
  # ----------------------------------------
  env-check:
    name: Environment Check
    runs-on: ubuntu-latest
    outputs:
      backend-only: ${{ steps.filter.outputs.backend-only }}
      frontend-only: ${{ steps.filter.outputs.frontend-only }}
    steps:
      - uses: actions/checkout@v4

      # Path filter to skip unnecessary work
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend-only:
              - 'backend/**'
              - 'docker-compose*.yml'
              - 'scripts/**'
            frontend-only:
              - 'frontend/**'

      - name: Validate required env vars (syntax check)
        run: |
          echo "Checking environment variable patterns..."
          # Verify .env.production.example has all required vars
          MISSING=0
          for VAR in DATABASE_URL JWT_ACCESS_SECRET JWT_REFRESH_SECRET CLIENT_URL; do
            if ! grep -q "^${VAR}=" backend/.env.production.example 2>/dev/null; then
              if grep -q "^# ${VAR}\|${VAR}=" backend/.env.example 2>/dev/null; then
                echo "OK ${VAR} defined in example"
              else
                echo "WARN ${VAR} not found in .env.example - may be required at runtime"
              fi
            else
              echo "OK ${VAR} defined in .env.production.example"
            fi
          done
          echo "Environment validation complete."

  # ----------------------------------------
  # 2. BACKEND CHECKS
  # ----------------------------------------
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: [env-check]
    env:
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/restaurant_pos_test
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name != 'pull_request' || needs.env-check.outputs.backend-only != 'true' || needs.env-check.outputs.frontend-only != 'true')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: restaurant_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./backend

      - name: Validate Prisma schema
        run: npx prisma validate
        working-directory: ./backend

      - name: Run Prisma migrations (test DB)
        run: npx prisma migrate deploy
        working-directory: ./backend

      - name: Check migration status
        run: npx prisma migrate status
        working-directory: ./backend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Lint check
        run: npm run lint
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 3
          if-no-files-found: error

  # ----------------------------------------
  # 3. FRONTEND CHECKS
  # ----------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [env-check]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: ./frontend

      - name: Lint check
        run: npm run lint
        working-directory: ./frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: /api

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3
          if-no-files-found: error

  # ----------------------------------------
  # 4. DOCKER BUILD CHECK
  # ----------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: restaurant-pos-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: restaurant-pos-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------
  # 5. E2E TESTS (Playwright)
  # ----------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: restaurant_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install all dependencies
        run: |
          npm ci
          npm --prefix backend ci
          npm --prefix frontend ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/restaurant_pos_test

      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/restaurant_pos_test

      - name: Seed test data
        run: npx tsx prisma/seed.ts
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/restaurant_pos_test
          NODE_ENV: test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        run: |
          npx tsx src/server.ts &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health/live > /dev/null 2>&1; then
              echo "Backend is ready."
              break
            fi
            sleep 1
          done
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/restaurant_pos_test
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret-ci-0123456789
          JWT_REFRESH_SECRET: test-refresh-secret-ci-0123456789
          CLIENT_URL: http://localhost:5173
          ALLOWED_ORIGINS: http://localhost:5173
          PORT: 5000
          AUTH_RATE_LIMIT_MAX: '1000'
          RATE_LIMIT_MAX: '10000'
          COOKIE_SECURE: 'false'

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:5000/api
          AUTH_RATE_LIMIT_MAX: '1000'
          RATE_LIMIT_MAX: '10000'

      - name: Upload Playwright test report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
        if: always()

  # ----------------------------------------
  # 6. SUMMARY
  # ----------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, e2e]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BACKEND_RESULT="${{ needs.backend.result }}"
          FRONTEND_RESULT="${{ needs.frontend.result }}"
          DOCKER_RESULT="${{ needs.docker.result }}"
          E2E_RESULT="${{ needs.e2e.result }}"

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | $BACKEND_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | $DOCKER_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | $E2E_RESULT |" >> $GITHUB_STEP_SUMMARY

          if [ "$BACKEND_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" ] && [ "$E2E_RESULT" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "OK All CI checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ERROR Some checks failed. Review the job logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
