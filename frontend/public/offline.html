<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Restaurant POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f172a; color: #f8fafc;
    }
    .container { text-align: center; max-width: 400px; padding: 2rem; }
    .icon { font-size: 64px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    .status { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #1e293b; border-radius: 9999px; font-size: 0.875rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .retry-btn {
      margin-top: 1rem; padding: 0.75rem 2rem; background: #3b82f6;
      color: white; border: none; border-radius: 0.5rem; font-size: 0.875rem;
      cursor: pointer; transition: background 0.2s;
    }
    .retry-btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>The Restaurant POS is running with limited functionality while offline. Cached data is still available. Changes will sync automatically when the connection is restored.</p>
    <div class="status">
      <span class="dot"></span>
      <span>No internet connection</span>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
